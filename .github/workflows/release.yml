name: Release 🏗️

on:
  push:
    branches: [master]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release:
    name: Handle release 🦋
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      publishedVersion: ${{ steps.changesets.outputs.publishedVersion }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1.4.9
        with:
          title: "chore: release"
          commit: "chore: release"
          version: bun run version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build ${{ matrix.target }} 🔨
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p synapse

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../synapse-${{ matrix.target }}.tar.gz synapse
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: synapse-${{ matrix.target }}
          path: synapse-${{ matrix.target }}.tar.gz

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.release.outputs.publishedVersion }}
          files: synapse-${{ matrix.target }}.tar.gz

  docker:
    name: Docker 🐳
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Manifold
        uses: docker/login-action@v3
        with:
          registry: manifold.omni.dev
          username: ${{ secrets.MANIFOLD_USERNAME }}
          password: ${{ secrets.MANIFOLD_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            manifold.omni.dev/omni/synapse-gateway:${{ needs.release.outputs.publishedVersion }}
            manifold.omni.dev/omni/synapse-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  schema:
    name: Publish OpenAPI schema 📋
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install oras
        uses: oras-project/setup-oras@v1

      - name: Log in to Manifold
        run: oras login manifold.omni.dev -u ${{ secrets.MANIFOLD_USERNAME }} -p ${{ secrets.MANIFOLD_TOKEN }}

      - name: Push OpenAPI spec
        run: |
          oras push manifold.omni.dev/omni/synapse-gateway-openapi:${{ needs.release.outputs.publishedVersion }} \
            --artifact-type application/vnd.omni.openapi \
            openapi.yaml:application/vnd.oai.openapi+yaml

  publish:
    name: Publish packages 📦
    needs: [release, build]
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=${{ needs.release.outputs.publishedVersion }}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Update Homebrew tap
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        if: env.TAP_GITHUB_TOKEN != ''
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          MACOS_X86_SHA256=$(shasum -a 256 artifacts/synapse-x86_64-apple-darwin/synapse-x86_64-apple-darwin.tar.gz | awk '{print $1}')
          MACOS_ARM_SHA256=$(shasum -a 256 artifacts/synapse-aarch64-apple-darwin/synapse-aarch64-apple-darwin.tar.gz | awk '{print $1}')
          LINUX_X86_SHA256=$(shasum -a 256 artifacts/synapse-x86_64-unknown-linux-gnu/synapse-x86_64-unknown-linux-gnu.tar.gz | awk '{print $1}')
          LINUX_ARM_SHA256=$(shasum -a 256 artifacts/synapse-aarch64-unknown-linux-gnu/synapse-aarch64-unknown-linux-gnu.tar.gz | awk '{print $1}')

          git clone https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/omnidotdev/homebrew-tap.git tap
          cd tap

          mkdir -p Formula
          cat > Formula/synapse.rb <<'FORMULAEOF'
          class Synapse < Formula
            desc "AI model router and gateway"
            homepage "https://synapse.omni.dev"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/omnidotdev/synapse-gateway/releases/download/v${VERSION}/synapse-aarch64-apple-darwin.tar.gz"
                sha256 "${MACOS_ARM_SHA256}"
              end
              on_intel do
                url "https://github.com/omnidotdev/synapse-gateway/releases/download/v${VERSION}/synapse-x86_64-apple-darwin.tar.gz"
                sha256 "${MACOS_X86_SHA256}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/omnidotdev/synapse-gateway/releases/download/v${VERSION}/synapse-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${LINUX_ARM_SHA256}"
              end
              on_intel do
                url "https://github.com/omnidotdev/synapse-gateway/releases/download/v${VERSION}/synapse-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${LINUX_X86_SHA256}"
              end
            end

            def install
              bin.install "synapse"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/synapse --version")
            end
          end
          FORMULAEOF
          sed -i "s/\${VERSION}/${VERSION}/g; s/\${MACOS_ARM_SHA256}/${MACOS_ARM_SHA256}/g; s/\${MACOS_X86_SHA256}/${MACOS_X86_SHA256}/g; s/\${LINUX_X86_SHA256}/${LINUX_X86_SHA256}/g; s/\${LINUX_ARM_SHA256}/${LINUX_ARM_SHA256}/g" Formula/synapse.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/synapse.rb
          if ! git diff --cached --quiet; then
            git commit -m "chore: update synapse to v${VERSION}"
            git push
          fi

      - name: Publish to AUR
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        if: env.AUR_SSH_PRIVATE_KEY != ''
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          mkdir -p ~/.ssh
          echo "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          cat >> ~/.ssh/config <<SSH
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            User aur
          SSH
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null

          publish_aur() {
            local pkg="$1"
            git clone "ssh://aur@aur.archlinux.org/${pkg}.git" "${pkg}" 2>/dev/null || {
              mkdir "${pkg}" && cd "${pkg}" && git init && git remote add origin "ssh://aur@aur.archlinux.org/${pkg}.git" && cd ..
            }
            cd "${pkg}"
            cp "../misc/packaging/aur/${pkg}/PKGBUILD" .
            sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
            # Compute checksums for source URLs (replaces updpkgsums)
            local -a checksums=()
            while IFS= read -r src; do
              local url="${src#*::}"
              checksums+=("$(curl -fsSL "$url" | sha256sum | awk '{print $1}')")
            done < <(bash -c "source PKGBUILD 2>/dev/null; printf '%s\n' \"\${source[@]}\"")

            # Update sha256sums in PKGBUILD
            perl -i -0777 -pe 's/^sha256sums=\(.*?\)\n//ms' PKGBUILD
            {
              printf "sha256sums=("
              for i in "${!checksums[@]}"; do
                [[ $i -gt 0 ]] && printf "\n            "
                printf "'%s'" "${checksums[$i]}"
              done
              printf ")\n"
            } >> PKGBUILD

            # Generate .SRCINFO (replaces makepkg --printsrcinfo)
            (
              source PKGBUILD 2>/dev/null
              printf "pkgbase = %s\n" "$pkgname"
              printf "\tpkgdesc = %s\n" "$pkgdesc"
              printf "\tpkgver = %s\n" "$pkgver"
              printf "\tpkgrel = %s\n" "$pkgrel"
              printf "\turl = %s\n" "$url"
              for v in "${arch[@]}"; do printf "\tarch = %s\n" "$v"; done
              for v in "${license[@]}"; do printf "\tlicense = %s\n" "$v"; done
              for v in "${makedepends[@]}"; do printf "\tmakedepends = %s\n" "$v"; done
              for v in "${depends[@]}"; do printf "\tdepends = %s\n" "$v"; done
              [[ -v provides ]] && for v in "${provides[@]}"; do printf "\tprovides = %s\n" "$v"; done
              [[ -v conflicts ]] && for v in "${conflicts[@]}"; do printf "\tconflicts = %s\n" "$v"; done
              for v in "${source[@]}"; do printf "\tsource = %s\n" "$v"; done
              for v in "${sha256sums[@]}"; do printf "\tsha256sums = %s\n" "$v"; done
              printf "\n"
              printf "pkgname = %s\n" "$pkgname"
            ) > .SRCINFO
            git config user.name "Omni"
            git config user.email "team@omni.dev"
            git add PKGBUILD .SRCINFO
            git diff --cached --quiet || git commit -m "Update to v${VERSION}"
            git push origin master
            cd ..
          }

          publish_aur "omnidotdev-synapse-gateway"
          publish_aur "omnidotdev-synapse-gateway-bin"

          rm -f ~/.ssh/aur
